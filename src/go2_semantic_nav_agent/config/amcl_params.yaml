amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_link
    global_frame_id: map
    odom_frame_id: odom
    tf_broadcast: true
    scan_topic: /scan_fixed
    set_initial_pose: false
    laser_model_type: likelihood_field
    max_particles: 2000
    min_particles: 500
    update_min_d: 0.1
    update_min_a: 0.1
    resample_interval: 1
    transform_tolerance: 1.0
